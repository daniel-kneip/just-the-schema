name: Publish

on:
  release:
    types: [published] # stable -> "latest"
  workflow_dispatch: # prerelease -> "next"

permissions:
  contents: read

jobs:
  # Runs untrusted dependency code (install scripts, tests). Deliberately has
  # NO id-token, so a compromised dependency cannot mint an OIDC token.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.11.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist
          retention-days: 1

  # Publishes the prebuilt artifact via OIDC trusted publishing. Installs no
  # dependencies and runs no lifecycle scripts, so the id-token is only present
  # while our own, trusted commands run.
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - run: npm install -g npm@latest

      - name: Resolve dist-tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Stable release: publish the version from package.json as-is.
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            # Manual prerelease: package.json version + unique suffix, kept off "latest".
            base="$(node -p "require('./package.json').version")"
            npm version "${base}-next.${{ github.run_number }}" --no-git-tag-version
            echo "tag=next" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --tag ${{ steps.meta.outputs.tag }} --access public --ignore-scripts
